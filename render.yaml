services:
  - type: web
    name: svgconverter-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    aptPackages:
      - potrace
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
